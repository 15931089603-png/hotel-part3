<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第三幕 归途 - 民宿杀人事件</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wood: {
                            900: '#1a120b',
                            800: '#2d1f14',
                            700: '#3d2a1a',
                            600: '#4d3520',
                            500: '#5d4026',
                        },
                        // 第三幕使用血红色系，营造微恐氛围
                        blood: {
                            500: '#ef4444',
                            400: '#f87171',
                            300: '#fca5a5',
                        }
                    },
                    fontFamily: {
                        serif: ['"Noto Serif SC"', 'serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
            }
            .text-shadow-lg {
                text-shadow: 0 0 20px rgba(239, 68, 68, 0.7), 0 0 40px rgba(239, 68, 68, 0.4);
            }
            .bg-wood-pattern {
                background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMmQxZjE0Ii8+PHJlY3QgeD0iMCIgeT0iMCIgd2lkdGg9IjQwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzNkMmExYSIgb3BhY2l0eT0iMC4zIi8+PHJlY3QgeD0iNjAiIHk9IjAiIHdpZHRoPSI0MCIgaGVpZ2h0PSIxMDAiIGZpbGw9IiMzZDJhMWEiIG9wYWNpdHk9IjAuMyIvPjxyZWN0IHg9IjAiIHk9IjQwIiB3aWR0aD0iMTAwIiBoZWlnaHQ9IjIwIiBmaWxsPSIjNGQzNTIwIiBvcGFjaXR5PSIwLjIiLz48L3N2Zz4=');
                background-repeat: repeat;
            }
            .blood-flicker {
                animation: flicker 3s infinite alternate;
            }
            @keyframes flicker {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.8; }
                75% { opacity: 0.9; }
                25% { opacity: 0.85; }
            }
            .fade-in {
                animation: fadeIn 1.5s ease-in forwards;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .rain {
                position: absolute;
                width: 1px;
                height: 100px;
                background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.3));
                animation: rain 1s linear infinite;
            }
            @keyframes rain {
                0% { transform: translateY(-100px); }
                100% { transform: translateY(100vh); }
            }
        }
    </style>
</head>
<body class="bg-wood-pattern min-h-screen text-gray-200 font-serif overflow-x-hidden relative">
    <!-- 雨滴效果 -->
    <div id="rain-container" class="fixed inset-0 pointer-events-none z-0"></div>
    
    <!-- 主容器 -->
    <div class="container mx-auto px-4 py-12 md:py-20 relative z-10">
        <div class="max-w-3xl mx-auto">
            <!-- 幕标题 -->
            <div class="text-center mb-12 fade-in" style="animation-delay: 0.2s;">
                <h1 class="text-3xl md:text-5xl font-bold text-blood-400 text-shadow-lg mb-3 blood-flicker">
                    第三幕 归途
                </h1>
                <p class="text-blood-300 text-sm mb-1">（包含一定的微恐元素，请谨慎游玩）</p>
                <p class="text-blood-300 text-sm mb-4">（会有BGM，佩戴耳机食用更佳≡ω≡）</p>
                <div class="w-24 h-1 bg-blood-500 mx-auto rounded-full opacity-70"></div>
            </div>
            
            <!-- 剧情介绍卡片 -->
            <div class="bg-wood-800/80 backdrop-blur-sm rounded-lg p-6 md:p-8 mb-8 shadow-2xl border border-wood-600 fade-in" style="animation-delay: 0.5s;">
                <div class="flex items-center mb-4">
                    <i class="fa fa-mobile-phone text-blood-400 mr-3 text-2xl"></i>
                    <h2 class="text-xl md:text-2xl font-semibold text-blood-300">案件进展</h2>
                </div>
                <p class="leading-relaxed text-gray-300 mb-6">
                    找出了真凶，一切仿佛水落石出，可你回到房间中越想越不对劲，本来八竿子打不着的一群人怎么会那么凑巧都参加了这次活动，余念怎[...]
                </p>
                <p class="leading-relaxed text-gray-300 mb-6">
                    幸运的是你在找民宿老板要嫌疑人资料时，偷偷备份民宿老板手机里的数据，可以在模拟器中操作老板的手机。这次一定要找出背后的真[...]
                </p>
                
                <!-- 提示信息 -->
                <div class="bg-wood-700/60 rounded-lg p-4 border-l-4 border-blood-500">
                    <p class="text-blood-300 text-sm leading-relaxed">
                        <i class="fa fa-keyboard-o mr-2"></i>
                        <strong>提示：</strong>依旧是通过搜索关键词推进剧情哦 ╹▽╹
                    </p>
                </div>
            </div>
            
            <!-- 进入模拟器按钮 -->
            <div class="text-center fade-in" style="animation-delay: 0.8s;">
                <a href="page3-1.html" class="inline-block bg-blood-500 hover:bg-blood-400 text-white font-bold py-4 px-12 rounded-lg text-xl transition-all duration-300 transform hover:scale-105 shadow-lg">
                    进入模拟器
                    <i class="fa fa-arrow-right ml-2"></i>
                </a>
            </div>
        </div>
    </div>
    
    <!-- 页脚 -->
    <footer class="absolute bottom-4 w-full text-center text-gray-500 text-sm z-10">
        <p>© 2026 民宿杀人事件 | 网页解密游戏</p>
    </footer>
    
    <script>
        // 创建雨滴效果
        function createRain() {
            const rainContainer = document.getElementById('rain-container');
            const rainCount = 50;
            
            for (let i = 0; i < rainCount; i++) {
                const rain = document.createElement('div');
                rain.classList.add('rain');
                rain.style.left = Math.random() * 100 + '%';
                rain.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
                rain.style.animationDelay = Math.random() * 2 + 's';
                rain.style.opacity = Math.random() * 0.5 + 0.2;
                rainContainer.appendChild(rain);
            }
        }
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            createRain();
        });
    </script>
</body>
</html>
