<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快递查询</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-md">
        <!-- 顶部导航栏 -->
        <div class="flex items-center mb-8">
            <button onclick="window.location.href='page1.html'" class="flex items-center text-gray-600 hover:text-blue-600 transition-colors duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
                返回
            </button>
            <h1 class="text-2xl font-bold text-gray-800 ml-4">快递查询</h1>
        </div>

        <!-- 查询卡片 -->
        <div class="bg-white rounded-2xl shadow-xl p-6 transform transition-all duration-500 hover:shadow-2xl">
            <!-- 快递图标 -->
            <div class="flex justify-center mb-6">
                <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                    </svg>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="mb-6">
                <label for="trackingNumber" class="block text-sm font-medium text-gray-700 mb-2">快递单号</label>
                <div class="flex">
                    <input 
                        type="text" 
                        id="trackingNumber" 
                        placeholder="请输入快递单号"
                        class="flex-1 px-4 py-3 border border-gray-300 rounded-l-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all duration-300"
                    >
                    <button 
                        onclick="searchExpress()"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-r-lg font-medium transition-colors duration-300 transform hover:scale-105 active:scale-95"
                    >
                        查询
                    </button>
                </div>
            </div>

            <!-- 结果显示区域 -->
            <div id="resultArea" class="hidden">
                <!-- 快递信息将在这里显示 -->
            </div>
        </div>
    </div>

    <script>
        function searchExpress() {
            const trackingNumber = document.getElementById('trackingNumber').value.trim();
            const resultArea = document.getElementById('resultArea');
            
            // 清空之前的结果并添加淡入动画
            resultArea.innerHTML = '';
            resultArea.classList.remove('hidden');
            resultArea.classList.add('animate-fade-in');
            
            if (trackingNumber === '1234569876') {
                // 显示快递信息
                resultArea.innerHTML = `
                    <div class="border-t pt-6">
                        <div class="flex items-center mb-4">
                            <div class="w-3 h-3 bg-green-500 rounded-full mr-2"></div>
                            <span class="text-green-600 font-bold text-lg">已送达</span>
                        </div>
                        
                        <div class="space-y-4 bg-gray-50 rounded-lg p-4">
                            <div class="flex">
                                <span class="text-gray-500 w-20">收件人:</span>
                                <span class="text-gray-800 font-medium">余念</span>
                            </div>
                            <div class="flex">
                                <span class="text-gray-500 w-20">电话号码:</span>
                                <span class="text-gray-800 font-medium">13333333333</span>
                            </div>
                            <div class="flex">
                                <span class="text-gray-500 w-20">收货地址:</span>
                                <span class="text-gray-800 font-medium">x省a市小番茄区圣女果街111号</span>
                            </div>
                        </div>
                        
                        <div class="mt-4 text-center text-sm text-gray-500">
                            您的快递已安全送达，感谢使用我们的服务！
                        </div>
                    </div>
                `;
            } else {
                // 显示查不到信息
                resultArea.innerHTML = `
                    <div class="border-t pt-6 text-center">
                        <div class="text-6xl mb-4">📦</div>
                        <p class="text-gray-600 text-lg">查不到捏Σ( ° △ °|||)︴</p>
                        <p class="text-gray-400 text-sm mt-2">请检查快递单号是否正确</p>
                    </div>
                `;
            }
        }

        // 支持回车键查询
        document.getElementById('trackingNumber').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchExpress();
            }
        });

        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
                animation: fadeIn 0.4s ease-out;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
