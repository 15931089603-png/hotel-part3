<!DOCTYPE html>
<html lang="zh-CN">
<head>

            <!-- 返回按钮 -->
            <a href="page1.html" class="flex items-center text-gray-600 hover:text-blue-600 transition-colors mr-4">
                <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                    <div class="w-24 h-24 rounded-full bg-white/20 flex items-center justify-center text-3xl font-bold mr-6">

            <div class="p-6">

                    <div class="border-b border-gray-100 pb-4">

                    </div>
                    
                    <div class="border-b border-gray-100 pb-4">

                        <p class="text-gray-800 font-medium">初级市场营销员</p>
                    </div>
                    
                    <div class="md:col-span-2 border-b border-gray-100 pb-4">
                        <p class="text-gray-500 text-sm mb-1">工作邮箱</p>
                        <a href="mailto:14444444444@111.com" class="text-blue-600 hover:underline font-medium">
                            14444444444@111.com
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

</html>
