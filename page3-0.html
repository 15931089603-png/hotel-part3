    <script>
        // 更新当前时间
        function updateTime() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long', hour: '2-digit', minute: '2-digit' };
            const timeString = now.toLocaleDateString('zh-CN', options);
            
            document.getElementById('current-time').textContent = timeString;
            document.getElementById('current-time-mobile').textContent = timeString;
        }
        
        // 初始化时间并每分钟更新
        updateTime();
        setInterval(updateTime, 60000);
        
        // 为需要清扫的房间添加闪烁效果
        const room202 = document.querySelector('.border-warning');
        if (room202) {
            setInterval(() => {
                room202.classList.toggle('border-warning');
                room202.classList.toggle('border-success');
            }, 1000);
        }
    </script>
