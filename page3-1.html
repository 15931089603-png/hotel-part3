<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大樱桃民宿 - 手机主页</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#e63946',
                        secondary: '#457b9d',
                        accent: '#f1faee',
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .app-icon {
                @apply transition-all duration-200 hover:scale-110 active:scale-95 cursor-pointer;
            }
            .status-bar-text {
                @apply text-white text-xs font-medium;
            }
            .building-silhouette {
                filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.15));
                animation: gentle-float 6s ease-in-out infinite;
            }
            @keyframes gentle-float {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-6px);
                }
            }
            .welcome-text {
                text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25), 0 0 30px rgba(255, 255, 255, 0.15);
                letter-spacing: 0.02em;
            }
        }
    </style>
</head>
<body class="overflow-hidden">
    <!-- 手机容器 - 蓝色背景 -->
    <div class="min-h-screen w-full bg-gradient-to-b from-[#3b82f6] via-[#2563eb] to-[#1e40af] flex flex-col relative">
        <!-- 背景装饰：柔光圆形光斑 -->
        <div class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 rounded-full bg-white/5 blur-3xl pointer-events-none"></div>
        <div class="absolute top-2/3 left-1/3 w-48 h-48 rounded-full bg-blue-300/10 blur-3xl pointer-events-none"></div>
        <!-- 二层小楼剪影 SVG -->
        <div class="absolute bottom-28 left-1/2 -translate-x-1/2 pointer-events-none building-silhouette z-0">
            <svg viewBox="0 0 220 200" width="190" height="173" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <mask id="buildingMask">
                        <!-- 白色建筑主体（二层） -->
                        <rect x="38" y="62" width="144" height="108" fill="white" rx="2" />
                        <!-- 人字形屋顶 -->
                        <polygon points="110,6 22,62 198,62" fill="white" />
                        <!-- 烟囱 -->
                        <rect x="148" y="16" width="20" height="46" fill="white" rx="1" />
                        <!-- 烟囱顶部装饰 -->
                        <rect x="144" y="14" width="28" height="7" fill="white" rx="1.5" />
                        <!-- 镂空：二层窗户（3个） -->
                        <rect x="58" y="78" width="24" height="28" fill="black" rx="3" />
                        <rect x="98" y="78" width="24" height="28" fill="black" rx="3" />
                        <rect x="138" y="78" width="24" height="28" fill="black" rx="3" />
                        <!-- 镂空：一层窗户（2个） -->
                        <rect x="58" y="124" width="24" height="28" fill="black" rx="3" />
                        <rect x="138" y="124" width="24" height="28" fill="black" rx="3" />
                        <!-- 镂空：大门（拱形顶） -->
                        <path d="M94,152 L94,128 Q94,118 110,118 Q126,118 126,128 L126,152 Z" fill="black" />
                        <!-- 镂空：门上的小圆窗 -->
                        <circle cx="110" cy="128" r="5" fill="white" />
                    </mask>
                </defs>
                <!-- 应用mask的白色剪影 -->
                <rect x="0" y="0" width="220" height="200" fill="white" mask="url(#buildingMask)" />
                <!-- 地面阴影椭圆 -->
                <ellipse cx="110" cy="178" rx="80" ry="6" fill="rgba(0,0,0,0.2)" />
            </svg>
        </div>
        <!-- 手机状态栏 -->
        <div class="flex justify-between items-center px-6 py-3 bg-black/20 relative z-10">
            <div class="status-bar-text" id="current-time">22:00</div>
            <div class="flex items-center space-x-1">
                <i class="fa fa-signal status-bar-text"></i>
                <i class="fa fa-wifi status-bar-text"></i>
                <i class="fa fa-battery-full status-bar-text"></i>
            </div>
        </div>
        <!-- 主屏幕内容区 -->
        <div class="flex-1 flex flex-col relative z-10 px-8 pt-4">
            <!-- 顶部空白区域 -->
            <div class="h-12"></div>
            <!-- 应用图标区域 -->
            <div class="grid grid-cols-2 gap-16 justify-items-center">
                <!-- 霸王龙浏览器 -->
                <a href="page3-2.html" class="app-icon flex flex-col items-center">
                    <div class="w-20 h-20 rounded-2xl bg-white shadow-lg flex items-center justify-center overflow-hidden">
                        <img src="picture22.jpg" alt="霸王龙浏览器" class="w-full h-full object-cover">
                    </div>
                    <span class="text-white text-sm mt-2 font-medium drop-shadow-md">霸王龙浏览器</span>
                </a>
                <!-- 酒店管理系统 -->
                <a href="page3-0.html" class="app-icon flex flex-col items-center">
                    <div class="w-20 h-20 rounded-2xl bg-white shadow-lg flex items-center justify-center overflow-hidden">
                        <img src="picture3-1.jpg" alt="酒店管理系统" class="w-full h-full object-cover">
                    </div>
                    <span class="text-white text-sm mt-2 font-medium drop-shadow-md">酒店管理系统</span>
                </a>
            </div>
            <!-- 弹性空白区域，将应用图标推向上方 -->
            <div class="flex-1"></div>
        </div>
        <!-- 右下角欢迎文字 -->
        <div class="absolute bottom-20 right-5 z-20 text-right pointer-events-none">
            <h1 class="welcome-text text-white text-xl sm:text-2xl font-bold drop-shadow-lg leading-tight">
                欢迎入住大樱桃民宿
            </h1>
            <p class="text-white/75 text-xs sm:text-sm mt-1.5 drop-shadow-md tracking-wide">
                祝您旅途愉快
            </p>
        </div>
        <!-- 底部指示条 -->
        <div class="flex justify-center pb-4 relative z-10">
            <div class="w-32 h-1 bg-white/50 rounded-full"></div>
        </div>
    </div>
    <script>
        // 更新当前时间（已注释，时间固定为22:00）
        // function updateTime() {
        //     const now = new Date();
        //     const hours = now.getHours().toString().padStart(2, '0');
        //     const minutes = now.getMinutes().toString().padStart(2, '0');
        //     document.getElementById('current-time').textContent = `${hours}:${minutes}`;
        // }
        // 初始化时间并每分钟更新（已注释）
        // updateTime();
        // setInterval(updateTime, 60000);
        // 防止页面滚动
        document.body.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
